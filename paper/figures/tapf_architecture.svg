<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <!-- Gradients -->
    <linearGradient id="indigoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cyanGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0" />
    </radialGradient>
    
    <!-- Filter for shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1e3a5f" flood-opacity="0.25"/>
    </filter>
  </defs>
  
  <!-- Background grid -->
  <rect width="1200" height="800" fill="#f8fafc"/>
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#e2e8f0" stroke-width="0.5"/>
  </pattern>
  <rect width="1200" height="800" fill="url(#grid)"/>
  
  <!-- Title -->
  <text x="600" y="50" font-family="JetBrains Mono, monospace" font-size="24" font-weight="bold" fill="#1e3a5f" text-anchor="middle">TAPF: TASK-ADAPTIVE PRIVACY FILTERING FRAMEWORK</text>
  <text x="600" y="75" font-family="JetBrains Mono, monospace" font-size="12" fill="#64748b" text-anchor="middle">Information Minimization Principle for Sensitive Domain LLM Deployment</text>
  
  <!-- Concentric circles representing information layers -->
  <circle cx="200" cy="400" r="180" fill="none" stroke="#1e3a5f" stroke-width="2" stroke-dasharray="4,4" opacity="0.3"/>
  <circle cx="200" cy="400" r="140" fill="none" stroke="#1e3a5f" stroke-width="2" opacity="0.4"/>
  <circle cx="200" cy="400" r="100" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.6"/>
  <circle cx="200" cy="400" r="60" fill="url(#centerGlow)" stroke="#00d4ff" stroke-width="2"/>
  
  <!-- Raw Data Layer -->
  <rect x="80" y="360" width="240" height="80" rx="8" fill="#1e3a5f" filter="url(#shadow)"/>
  <text x="200" y="395" font-family="Space Grotesk, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">RAW DATA</text>
  <text x="200" y="415" font-family="JetBrains Mono, monospace" font-size="10" fill="#00d4ff" text-anchor="middle">PII | Context | Evidence</text>
  
  <!-- Filter symbol -->
  <polygon points="380,380 420,420 380,420 380,380" fill="#ffb800" filter="url(#shadow)"/>
  <text x="400" y="435" font-family="JetBrains Mono, monospace" font-size="10" fill="#64748b" text-anchor="middle">FILTER</text>
  
  <!-- Arrow -->
  <line x1="320" y1="400" x2="450" y2="400" stroke="#00d4ff" stroke-width="2"/>
  <polygon points="450,400 440,395 440,405" fill="#00d4ff"/>
  
  <!-- Filtered Output -->
  <rect x="460" y="360" width="180" height="80" rx="8" fill="#00d4ff" filter="url(#shadow)"/>
  <text x="550" y="395" font-family="Space Grotesk, sans-serif" font-size="14" font-weight="bold" fill="#1e3a5f" text-anchor="middle">FILTERED OUTPUT</text>
  <text x="550" y="415" font-family="JetBrains Mono, monospace" font-size="10" fill="#1e3a5f" text-anchor="middle">M_i (Minimal Set)</text>
  
  <!-- Key metrics -->
  <text x="200" y="260" font-family="JetBrains Mono, monospace" font-size="10" fill="#64748b" text-anchor="middle">I(M_i, PII) = ε</text>
  <text x="550" y="300" font-family="JetBrains Mono, monospace" font-size="10" fill="#00d4ff" text-anchor="middle">Q(M_i, T) ≈ Q*</text>
  
  <!-- Legend -->
  <rect x="700" y="120" width="460" height="280" rx="8" fill="#ffffff" stroke="#64748b" stroke-width="1"/>
  <text x="720" y="150" font-family="Space Grotesk, sans-serif" font-size="14" font-weight="bold" fill="#1e3a5f">KEY PRINCIPLES</text>
  
  <circle cx="740" cy="185" r="8" fill="#1e3a5f"/>
  <text x="760" y="190" font-family="JetBrains Mono, monospace" font-size="11" fill="#1e3a5f">Raw Sensitive Data</text>
  
  <circle cx="740" cy="215" r="8" fill="#ffb800"/>
  <text x="760" y="220" font-family="JetBrains Mono, monospace" font-size="11" fill="#1e3a5f">IM Filter (Task-Adaptive)</text>
  
  <circle cx="740" cy="245" r="8" fill="#00d4ff"/>
  <text x="760" y="250" font-family="JetBrains Mono, monospace" font-size="11" fill="#1e3a5f">Minimal Sufficient Info</text>
  
  <!-- IMP Formula -->
  <rect x="720" y="280" width="420" height="50" rx="4" fill="#f1f5f9"/>
  <text x="930" y="305" font-family="JetBrains Mono, monospace" font-size="14" fill="#1e3a5f" text-anchor="middle" font-style="italic">∀ T, PII: ∃ M_i | I(M_i, PII) = ε ∧ Q(M_i, T) = Q*</text>
  <text x="930" y="320" font-family="JetBrains Mono, monospace" font-size="9" fill="#64748b" text-anchor="middle">Information Minimization Principle</text>
  
  <!-- Properties -->
  <text x="720" y="355" font-family="Space Grotesk, sans-serif" font-size="12" font-weight="bold" fill="#1e3a5f">PROPERTIES</text>
  <text x="740" y="375" font-family="JetBrains Mono, monospace" font-size="10" fill="#64748b">• Task-Adaptive: M_i varies by T</text>
  <text x="740" y="390" font-family="JetBrains Mono, monospace" font-size="10" fill="#64748b">• Completeness: DAG ensures no info loss</text>
  
  <!-- SOP-DAG Architecture -->
  <rect x="700" y="420" width="460" height="350" rx="8" fill="#ffffff" stroke="#64748b" stroke-width="1"/>
  <text x="930" y="450" font-family="Space Grotesk, sans-serif" font-size="14" font-weight="bold" fill="#1e3a5f">SOP-DAG: 5-PHASE TASK DECOMPOSITION</text>
  
  <!-- Phase 1 -->
  <rect x="720" y="470" width="100" height="35" rx="4" fill="#1e3a5f"/>
  <text x="770" y="485" font-family="JetBrains Mono, monospace" font-size="9" fill="#ffffff" text-anchor="middle">S1-S3</text>
  <text x="770" y="497" font-family="JetBrains Mono, monospace" font-size="8" fill="#00d4ff" text-anchor="middle">Registration</text>
  
  <line x1="820" y1="487" x2="850" y2="487" stroke="#64748b" stroke-width="1"/>
  
  <!-- Phase 2 -->
  <rect x="855" y="470" width="100" height="35" rx="4" fill="#1e3a5f"/>
  <text x="905" y="485" font-family="JetBrains Mono, monospace" font-size="9" fill="#ffffff" text-anchor="middle">S4-S8</text>
  <text x="905" y="497" font-family="JetBrains Mono, monospace" font-size="8" fill="#00d4ff" text-anchor="middle">Evidence</text>
  
  <line x1="955" y1="487" x2="985" y2="487" stroke="#64748b" stroke-width="1"/>
  
  <!-- Phase 3 -->
  <rect x="990" y="470" width="100" height="35" rx="4" fill="#ffb800"/>
  <text x="1040" y="485" font-family="JetBrains Mono, monospace" font-size="9" fill="#1e3a5f" text-anchor="middle">S9-S13</text>
  <text x="1040" y="497" font-family="JetBrains Mono, monospace" font-size="8" fill="#1e3a5f" text-anchor="middle">Analysis</text>
  
  <line x1="1090" y1="487" x2="1120" y2="487" stroke="#64748b" stroke-width="1"/>
  
  <!-- Phase 4-5 -->
  <rect x="720" y="520" width="200" height="35" rx="4" fill="#00d4ff"/>
  <text x="820" y="535" font-family="JetBrains Mono, monospace" font-size="9" fill="#1e3a5f" text-anchor="middle">S14-QA | S15-Report</text>
  <text x="820" y="547" font-family="JetBrains Mono, monospace" font-size="8" fill="#1e3a5f" text-anchor="middle">Final Output</text>
  
  <!-- Node modes -->
  <text x="720" y="590" font-family="Space Grotesk, sans-serif" font-size="11" font-weight="bold" fill="#1e3a5f">NODE MODES</text>
  <rect x="720" y="600" width="60" height="25" rx="4" fill="#1e3a5f"/>
  <text x="750" y="616" font-family="JetBrains Mono, monospace" font-size="10" fill="#ffffff" text-anchor="middle">RULE</text>
  <text x="790" y="616" font-family="JetBrains Mono, monospace" font-size="9" fill="#64748b">Local (zero API risk)</text>
  
  <rect x="720" y="635" width="60" height="25" rx="4" fill="#ffb800"/>
  <text x="750" y="651" font-family="JetBrains Mono, monospace" font-size="10" fill="#1e3a5f" text-anchor="middle">LLM</text>
  <text x="790" y="651" font-family="JetBrains Mono, monospace" font-size="9" fill="#64748b">Filtered Input (medium risk)</text>
  
  <rect x="720" y="670" width="60" height="25" rx="4" fill="#00d4ff"/>
  <text x="750" y="686" font-family="JetBrains Mono, monospace" font-size="10" fill="#1e3a5f" text-anchor="middle">HYBRID</text>
  <text x="790" y="686" font-family="JetBrains Mono, monospace" font-size="9" fill="#64748b">API + Local Verify</text>
  
  <!-- Stats -->
  <rect x="940" y="580" width="200" height="150" rx="8" fill="#f1f5f9"/>
  <text x="1040" y="605" font-family="Space Grotesk, sans-serif" font-size="11" font-weight="bold" fill="#1e3a5f" text-anchor="middle">PERFORMANCE</text>
  <text x="1040" y="635" font-family="JetBrains Mono, monospace" font-size="24" font-weight="bold" fill="#00d4ff" text-anchor="middle">97%</text>
  <text x="1040" y="655" font-family="JetBrains Mono, monospace" font-size="9" fill="#64748b" text-anchor="middle">Quality Retention</text>
  <text x="1040" y="685" font-family="JetBrains Mono, monospace" font-size="24" font-weight="bold" fill="#ffb800" text-anchor="middle">62%</text>
  <text x="1040" y="705" font-family="JetBrains Mono, monospace" font-size="9" fill="#64748b" text-anchor="middle">Info Exposure Reduction</text>
</svg>